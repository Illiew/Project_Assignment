<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shawarma Shop </title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        #game-container {
            width: 1000px;
            height: 700px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            background: #000;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            font-size: 16px;
            color: white;
        }
        #error-output {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.85);
            color: #ff6666;
            font-family: monospace;
            font-size: 14px;
            padding: 10px;
            display: none;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="error-output"></div>
    <script src="js/game.js?v=2"></script>
    <script>
        console.log('Page scripts:', Array.from(document.scripts).map(s => s.src));
        const hasBoot = Array.from(document.scripts).some(s => (s.src || '').includes('game-boot.js'));
        if (hasBoot) console.warn('Detected game-boot.js in the DOM (possibly cached).');
    </script>
</body>
</html>
